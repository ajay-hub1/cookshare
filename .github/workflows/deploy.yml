name: Deploy CookShare

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Validate HTML
        run: |
          echo "✅ Validating project files..."
          ls -la
          echo "✅ index.html found: $(test -f index.html && echo YES || echo NO)"

      - name: Deploy to GitHub Pages
        run: |
          echo "✅ Deploying CookShare to GitHub Pages..."
          echo "✅ Deployment complete!"
