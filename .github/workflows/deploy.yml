name: Deploy CookShare to Azure Storage

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Upload to Azure Blob Storage
        uses: azure/CLI@v2
        with:
          inlineScript: |
            az storage blob upload \
              --account-name cooksharea09f \
              --container-name '$web' \
              --name index.html \
              --file index.html \
              --content-type text/html \
              --overwrite true \
              --connection-string "${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}"
